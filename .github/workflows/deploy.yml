name: CI — Type Check & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Netlify auto-deploys via its own git integration on every push.
# This workflow only runs quality checks (type-check, lint, unit tests).
# Do NOT add a Netlify deploy step here — it causes broken deploys
# when DB env vars are missing from GitHub Secrets.

jobs:
  quality:
    name: Type Check & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          DIRECT_URL: "postgresql://localhost/dummy"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: "postgresql://localhost/dummy"
          DIRECT_URL: "postgresql://localhost/dummy"
          JWT_SECRET: "ci-test-secret"
          NEXTAUTH_SECRET: "ci-test-secret"
