name: CI/CD — Test → Build → Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────
# JOB 1 — Quality gate (type-check + tests)
# ─────────────────────────────────────────────
jobs:
  quality:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: propmanager_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:test_password@localhost:5432/propmanager_test?sslmode=disable
      DIRECT_URL: postgresql://postgres:test_password@localhost:5432/propmanager_test?sslmode=disable
      JWT_SECRET: test-jwt-secret-for-ci-only-32chars
      NEXTAUTH_SECRET: test-nextauth-secret-ci-only
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run DB migrations
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true   # warn, don't fail on lint

      - name: Unit tests with coverage
        run: npm test -- --coverage --passWithNoTests
        timeout-minutes: 10

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 2 — Production build verification
  # ─────────────────────────────────────────────
  build:
    name: 🏗 Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Generate app icons
        run: node scripts/generate-icons.mjs

      - name: Build Next.js (includes prisma generate)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost/dummy' }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://localhost/dummy' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'build-secret-placeholder' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'build-secret-placeholder' }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Cache .next build
        uses: actions/cache/save@v4
        with:
          path: .next
          key: nextjs-build-${{ github.sha }}

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to Netlify (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: .next
          key: nextjs-build-${{ github.sha }}

      - name: Run production DB migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Deploy to Netlify
        id: deploy
        uses: netlify/actions/cli@master
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        with:
          args: deploy --prod --dir=.next --message="Deploy ${{ github.sha }} by ${{ github.actor }}"

      - name: Output deploy URL
        run: echo "Deployed to ${{ steps.deploy.outputs.deploy-url }}"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue?.number || 1,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deploy failed for commit ${{ github.sha }}'
            })

  # ─────────────────────────────────────────────
  # JOB 4 — Post-deploy smoke tests
  # ─────────────────────────────────────────────
  smoke:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/e2e/booking-flow.spec.ts --project=chromium
        env:
          BASE_URL: ${{ secrets.NEXTAUTH_URL }}
        timeout-minutes: 10

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 5 — PR preview deploy (non-main branches)
  # ─────────────────────────────────────────────
  preview:
    name: 🔎 Preview Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: .next
          key: nextjs-build-${{ github.sha }}

      - name: Deploy preview to Netlify
        id: preview
        uses: netlify/actions/cli@master
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        with:
          args: deploy --dir=.next --message="PR #${{ github.event.pull_request.number }} preview"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🔎 Preview Deployment',
                '',
                `**URL:** ${{ steps.preview.outputs.deploy-url }}`,
                '',
                '**Test credentials:**',
                '- Admin: `admin@propmanager.com` / `admin123`',
              ].join('\n')
            })
