<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — PropManager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container { text-align: center; max-width: 400px; }
    .icon {
      width: 72px; height: 72px; background: #1e3a5f; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      border: 1px solid #1e40af40;
    }
    .icon svg { width: 36px; height: 36px; stroke: #3b82f6; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94a3b8; font-size: 0.875rem; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: #3b82f6; color: white; border: none;
      padding: 0.75rem 1.5rem; border-radius: 0.5rem;
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    .tip {
      margin-top: 1.5rem; padding: 1rem; background: #1e293b;
      border-radius: 0.5rem; border: 1px solid #334155;
      font-size: 0.75rem; color: #64748b; text-align: left;
    }
    .tip strong { color: #94a3b8; display: block; margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection detected. Some features may be unavailable. Previously loaded data is still accessible.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="tip">
      <strong>Tip</strong>
      PropManager works offline for recently viewed data. Connect to the internet to sync new bookings and financial records.
    </div>
  </div>
</body>
</html>
