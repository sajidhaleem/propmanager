version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: propmanager_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: property_manager
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propmanager_app
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/property_manager?schema=public
      JWT_SECRET: change-this-in-production-must-be-32-chars-min
      NEXTAUTH_SECRET: change-this-in-production-secret
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node server.js"

volumes:
  postgres_data:
